<div class="content-area">
  <div class="page-header">
    <h4>Audit Logs</h4>
  </div>

  <div class="card mb-3">
    <div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label mb-1">Service Name</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="filterService" placeholder="e.g. work-order-service">
        </div>
        <div class="col-md-3">
          <label class="form-label mb-1">Resource Type</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="filterResource" placeholder="e.g. WORK_ORDER">
        </div>
        <div class="col-md-3">
          <label class="form-label mb-1">Action</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="filterAction" placeholder="e.g. CREATE">
        </div>
        <div class="col-md-3 d-flex gap-2">
          <button class="btn btn-sm btn-primary" (click)="applyFilter()">Filter</button>
          <button class="btn btn-sm btn-outline-secondary" (click)="clearFilter()">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-amber"></div></div>

  <div class="card" *ngIf="!loading">
    <div class="card-body p-0">
      <div *ngIf="items.length === 0" class="text-center py-4 text-muted">No audit logs found.</div>
      <table class="table table-hover mb-0" *ngIf="items.length > 0">
        <thead>
          <tr><th>ID</th><th>Action</th><th>Resource</th><th>Service</th><th>Details</th><th>Timestamp</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let log of items">
            <td>#{{ log.auditId }}</td>
            <td><span class="badge-progress">{{ log.action }}</span></td>
            <td>{{ log.resourceType }}</td>
            <td>{{ log.serviceName }}</td>
            <td>{{ log.details }}</td>
            <td>{{ log.timestamp | slice:0:19 }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
